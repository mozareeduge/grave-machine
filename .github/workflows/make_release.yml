name: Make release (one-shot)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: b9484559262c12fb829dc97ea3cff3951118477e
          fetch-depth: 0

      - name: Verify release commit is present
        run: |
          git cat-file -e b9484559262c12fb829dc97ea3cff3951118477e || (echo 'release commit not found'; exit 1)

      - name: Create tag
        run: |
          git config user.email "mozareeduge@gmail.com"
          git config user.name "Mozare"
          git tag v1.1.0 b9484559262c12fb829dc97ea3cff3951118477e
          git push origin v1.1.0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.1.0 \
            --title "Grave-Machine v1.1.0 — bilingual public archive" \
            --notes "$(cat RELEASE_NOTES.md)" \
            index.html \
            SHA256SUMS
